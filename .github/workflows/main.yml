name: Build ALL
run-name: Build ALL
on:
  workflow_dispatch: {}
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  Prepare_Release:
    runs-on: ubuntu-22.04
    outputs:
      should_build: ${{ steps.prepare.outputs.should_build }}
      release_type: ${{ steps.prepare.outputs.release_type }}
      version: ${{ steps.prepare.outputs.version }}
      tag_name: ${{ steps.prepare.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: prepare
        shell: bash
        run: |
          set -euo pipefail

          version="$(grep -m1 -E '^## +v?[0-9]' CHANGELOG.md | sed -E 's/^## +v?([^ ]+).*/\1/')"
          if [ -z "$version" ]; then
            echo "No version found in CHANGELOG.md" >&2
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "release_type=release" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag_name=v$version" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.before }}"
          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD^)"
          fi

          changed_files="$(git diff --name-only "$base" HEAD)"
          changelog_version_changed=false
          code_changed=false

          if echo "$changed_files" | grep -q '^CHANGELOG.md$'; then
            old_version="$(git show "$base:CHANGELOG.md" 2>/dev/null | grep -m1 -E '^## +v?[0-9]' | sed -E 's/^## +v?([^ ]+).*/\1/' || true)"
            if [ "$old_version" != "$version" ]; then
              changelog_version_changed=true
            fi
          fi

          if echo "$changed_files" | grep -E -q '^(lib|assets|android|ios|macos|windows|linux|debian|patch|fastlane|test)/|^(pubspec.yaml|pubspec.lock|rust-toolchain.toml|analysis_options.yaml)$'; then
            code_changed=true
          fi

          if [ "$changelog_version_changed" = "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "release_type=release" >> "$GITHUB_OUTPUT"
            echo "tag_name=v$version" >> "$GITHUB_OUTPUT"
          elif [ "$code_changed" = "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "release_type=prerelease" >> "$GITHUB_OUTPUT"
            echo "tag_name=v$version-pre.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "release_type=none" >> "$GITHUB_OUTPUT"
            echo "tag_name=none" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

  Build_MacOS:
    runs-on: macos-15
    needs: Prepare_Release
    if: needs.Prepare_Release.outputs.should_build == 'true'
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version-file: pubspec.yaml
          architecture: x64
      - run: sudo xcode-select --switch /Applications/Xcode_16.4.app
      - run: flutter pub get
        # Step 1: Decode and install the certificate
      - name: Decode and install certificate
        env:
          CERTIFICATE: ${{ secrets.CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE" | base64 --decode > signing_certificate.p12
          security import signing_certificate.p12 -k ~/Library/Keychains/login.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign

      - name: Check rust-toolchain.toml
        run: rustup show

      # Step 2: Build the Flutter macOS app
      - name: Build Flutter macOS App
        run: flutter build macos --release

      # Step 3: Create the DMG file
      - name: Create DMG
        run: |
          mkdir -p dist
          mkdir -p dist/dmg_contents
          cp -R build/macos/Build/Products/Release/venera.app dist/dmg_contents/
          ln -s /Applications dist/dmg_contents/Applications
          hdiutil create -volname "venera" -srcfolder dist/dmg_contents -ov -format UDZO "dist/venera.dmg"

      - name: Add version to filename
        run: |
          APP_VERSION=$(grep "version:" pubspec.yaml | cut -d':' -f2 | tr -d ' ')
          mkdir -p result
          mv dist/venera.dmg result/venera-$APP_VERSION.dmg

      # Step 4: Attach and upload artifacts (optional)
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos_build
          path: result/
  Build_IOS:
    runs-on: macos-15
    needs: Prepare_Release
    if: needs.Prepare_Release.outputs.should_build == 'true'
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version-file: pubspec.yaml
          architecture: x64
      - run: sudo xcode-select --switch /Applications/Xcode_16.4.app
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - run: |
          mkdir -p /Users/runner/work/venera/venera/build/ios/iphoneos/Payload
          mv /Users/runner/work/venera/venera/build/ios/iphoneos/Runner.app /Users/runner/work/venera/venera/build/ios/iphoneos/Payload
          cd /Users/runner/work/venera/venera/build/ios/iphoneos/
          zip -r venera-ios.ipa Payload
      - name: Add version to filename
        run: |
          APP_VERSION=$(grep "version:" pubspec.yaml | cut -d':' -f2 | tr -d ' ')
          mkdir -p result
          mv build/ios/iphoneos/venera-ios.ipa result/venera-ios-$APP_VERSION.ipa
      - uses: actions/upload-artifact@v4
        with:
          name: ios_build
          path: result/
  Build_Android:
    runs-on: ubuntu-22.04
    needs: Prepare_Release
    if: needs.Prepare_Release.outputs.should_build == 'true'
    steps:
      - uses: actions/checkout@v3
      - run: rm -rf /opt/hostedtoolcache
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version-file: pubspec.yaml
          architecture: x64
      - name: Decode and install certificate
        env:
          STORE_FILE: ${{ secrets.ANDROID_KEYSTORE }}
          PROPERTY_FILE: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
            echo "$STORE_FILE" | base64 --decode > android/keystore.jks
            echo "$PROPERTY_FILE" > android/key.properties
      - uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'
      - name: Check rust-toolchain.toml
        run: rustup show
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: apks
          path: build/app/outputs/apk/release
  Build_Windows:
    runs-on: windows-latest
    needs: Prepare_Release
    if: needs.Prepare_Release.outputs.should_build == 'true'
    steps:
      - uses: actions/checkout@v3
      - name: install dependencies
        run: | 
          choco install yq -y
          pip install httpx
      - name: Install Inno Setup
        run: choco install innosetup --no-progress
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version-file: pubspec.yaml
          architecture: x64
      - name: build
        run: |
          flutter pub get
          python windows/build.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows_build
          path: build/windows/Venera-*
  Build_Linux:
    runs-on: ubuntu-22.04
    needs: Prepare_Release
    if: needs.Prepare_Release.outputs.should_build == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version-file: pubspec.yaml
          architecture: x64
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev webkit2gtk-4.1
          dart pub global activate -s git https://github.com/venera-app/flutter_to_debian.git
      - run: python3 debian/build.py x64
      - run: dart run flutter_to_arch
      - run: |
          sudo rm -rf build/linux/arch/app.tar.gz
          sudo rm -rf build/linux/arch/pkg
          sudo rm -rf build/linux/arch/src
          sudo rm -rf build/linux/arch/PKGBUILD
      - uses: actions/upload-artifact@v4
        with:
          name: deb_build
          path: build/linux/x64/release/debian
      - uses: actions/upload-artifact@v4
        with:
          name: arch_build
          path: build/linux/arch/
  Build_Linux_ARM64:
    runs-on: ubuntu-22.04-arm
    needs: Prepare_Release
    if: needs.Prepare_Release.outputs.should_build == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'master'
          flutter-version-file: pubspec.yaml
      - run: |
          flutter pub get
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev webkit2gtk-4.1
          dart pub global activate -s git https://github.com/venera-app/flutter_to_debian.git
      - name: "Patch font"
        run: |
          dart run patch/font.dart
      - run: python3 debian/build.py arm64
      - uses: actions/upload-artifact@v4
        with:
          name: deb_arm64_build
          path: build/linux/x64/release/debian # This is a bug related to flutter_to_debian, but it's not a big deal.

  Release:
    runs-on: ubuntu-22.04
    needs: [Prepare_Release, Build_MacOS, Build_IOS, Build_Android, Build_Windows, Build_Linux, Build_Linux_ARM64]
    if: needs.Prepare_Release.outputs.should_build == 'true' && needs.Prepare_Release.outputs.release_type != 'none'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: macos_build
          path: outputs
      - uses: actions/download-artifact@v4
        with:
          name: ios_build
          path: outputs
      - uses: actions/download-artifact@v4
        with:
          name: apks
          path: outputs
      - uses: actions/download-artifact@v4
        with:
          name: windows_build
          path: outputs
      - uses: actions/download-artifact@v4
        with:
          name: deb_build
          path: outputs
      - uses: actions/download-artifact@v4
        with:
          name: arch_build
          path: outputs
      - uses: actions/download-artifact@v4
        with:
          name: deb_arm64_build
          path: outputs
      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ needs.Prepare_Release.outputs.release_type }}" = "release" ]; then
            awk '
              /^## / {
                if (seen) exit
                seen=1
                next
              }
              seen { print }
            ' CHANGELOG.md > release_notes.md
          else
            {
              echo "自动预发布构建"
              echo
              echo "- 版本：v${{ needs.Prepare_Release.outputs.version }}"
              echo "- 提交：${{ github.sha }}"
              echo "- 说明：更新日志版本号未变化，但检测到代码修改，因此生成 pre-release 包。"
            } > release_notes.md
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.Prepare_Release.outputs.tag_name }}
          name: ${{ needs.Prepare_Release.outputs.tag_name }}
          body_path: release_notes.md
          prerelease: ${{ needs.Prepare_Release.outputs.release_type == 'prerelease' }}
          make_latest: ${{ needs.Prepare_Release.outputs.release_type == 'release' }}
          files: |
            outputs/*.ipa
            outputs/*.dmg
            outputs/*.apk
            outputs/*.zip
            outputs/*.exe
            outputs/*.deb
            outputs/*.zst
            outputs/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.ACTION_GITHUB_TOKEN || github.token }}
