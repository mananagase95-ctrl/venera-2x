name: Update AltStore Source

on:
  workflow_run:
    workflows: ["Build ALL"]
    types: [completed]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-source:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Record job start time
      id: job_start_time
      run: echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT

    - name: Update AltStore source
      id: update_source
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python update_alt_store.py
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        git add alt_store.json
        if git diff --staged --quiet; then
          echo "changes=false" >> $GITHUB_OUTPUT
        else
          # Create a new branch for the PR
          branch_name="update-altstore-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$branch_name"
          git commit -m "更新 AltStore 源"
          git push -u origin "$branch_name"
          
          # Create PR using GitHub CLI
          gh pr create \
          --title "更新 AltStore 源" \
          --body "此 PR 使用 venera-2x 最新正式 Release 信息更新 alt_store.json。" \
          --head "$branch_name" \
          --base master
          
          echo "changes=true" >> $GITHUB_OUTPUT
        fi

    - name: Calculate job duration
      id: duration
      if: always()
      run: |
        end_time=$(date +%s)
        duration=$((end_time - ${{ steps.job_start_time.outputs.start_time }}))
        echo "duration=$duration seconds" >> $GITHUB_OUTPUT

    - name: Create job summary
      run: |
        if [[ "${{ steps.update_source.outputs.changes }}" == "true" ]]; then
          echo "## AltStore 源更新摘要" >> $GITHUB_STEP_SUMMARY
          echo "检测到变更并已创建 PR。" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "alt_store.json 已根据 venera-2x 最新正式 Release 信息更新。" >> $GITHUB_STEP_SUMMARY
        else
          echo "## AltStore 源更新摘要" >> $GITHUB_STEP_SUMMARY
          echo "未检测到变更。" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "alt_store.json 已是最新，无需更新。" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "执行时间" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "本次任务耗时 ${{ steps.duration.outputs.duration }}。" >> $GITHUB_STEP_SUMMARY
